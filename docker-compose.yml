services:
  postgres:
    image: postgres:15
    container_name: airbyte-source-postgres
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: airbyte_user
      POSTGRES_PASSWORD: airbyte_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airbyte_user -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
